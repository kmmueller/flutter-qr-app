name: Build iOS Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (e.g., 1.0.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HAS_SIGNING_CREDS: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}

jobs:
  build-ios-release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install signing certificate
        if: env.HAS_SIGNING_CREDS == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: env.HAS_SIGNING_CREDS == 'true'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (signed)
        if: env.HAS_SIGNING_CREDS == 'true'
        run: flutter build ios --no-pub

      - name: Build iOS (unsigned)
        if: env.HAS_SIGNING_CREDS != 'true'
        run: flutter build ios --no-codesign --no-pub

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q Runner.ipa Payload
          rm -rf Payload

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.event.inputs.build_number }}
          path: build/ios/iphoneos/Runner.ipa
          retention-days: 90

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ios-${{ github.event.inputs.build_number }}
          name: iOS Release ${{ github.event.inputs.build_number }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
